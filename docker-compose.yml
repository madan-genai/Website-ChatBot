services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-chatbot
    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

    volumes:
      - ./data:/app/data

    networks:
      - rag-network

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h localhost -uroot -p$${MYSQL_PASSWORD} || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

    networks:
      - rag-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - rag-network

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    networks:
      - rag-network

volumes:
  mysql_data:
  redis_data:
  qdrant_data:

networks:
  rag-network:
    driver: bridge